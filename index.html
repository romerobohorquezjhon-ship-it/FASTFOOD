<!DOCTYPE html>
<html lang="es">
<head>
    
    <meta charset="UTF-8">
    <title>Bienvenida - Fast Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card text-center border-t-4 border-cyan-500">
        <h1 class="text-3xl font-black text-white mb-2">FAST FOOD SERVICE</h1>
        <p class="text-xs text-gray-400 mb-10 uppercase">Plataforma Corporativa</p>
        <div class="grid gap-4">
            <button onclick="verificarSesion()" class="btn-primary">Iniciar</button>
            <a href="registro1.html" class="bg-gray-700 text-white font-black py-4 rounded-lg text-center uppercase">Registrarse</a>
        </div>
    </div>
    <script>
        function verificarSesion() {
            const user = localStorage.getItem('usuario');
            if (user) window.location.href = 'roles1.html';
            else alert("Primero debes registrarte.");
        }
    </script>
</body>
</html>
